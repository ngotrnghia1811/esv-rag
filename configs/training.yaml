# ESV-RAG Training Configuration (§3.7)
# Two-stage pipeline: MCTS trace generation → SFT → PPO

train:
  # Stage 1 — trace generation
  num_curated_questions: 4000
  complexity_threshold: 0.6
  trace_output_dir: "train_data/traces"
  data_multiply_factor: 6

  # Stage 2a — supervised fine-tuning (SFT)
  sft_base_model: "meta-llama/Llama-3.2-1B"
  sft_lr: 5.0e-5
  sft_batch_size: 128
  sft_epochs: 3
  sft_output_dir: "checkpoints/sft"

  # Stage 2b — PPO with OpenRLHF
  ppo_actor_lr: 5.0e-7
  ppo_critic_lr: 9.0e-6
  ppo_clip_eps: 0.2
  ppo_kl_coeff: 0.01
  ppo_entropy_coeff: 0.001
  ppo_value_coeff: 0.5
  ppo_rollout_batch: 512
  ppo_train_batch: 64
  ppo_epochs_per_batch: 4
  ppo_iterations: 500
  ppo_output_dir: "checkpoints/ppo"

  # Infrastructure
  num_gpus: 4
  use_deepspeed: true
  deepspeed_stage: 3

# Inherit generator/retriever from esv_mcts.yaml
generator:
  api_url: null
  model_name: "gpt-4o-mini"    # used for MCTS trace generation
  max_tokens: 1024
  temperature: 0.8
  top_p: 0.9
  use_cache: true
  cache_dir: "cache/generator"

retriever:
  method: "e5base"
  corpus_path: ""
  index_path: "storage/indexes"
  retrieval_topk: 5
  use_cache: true
  cache_path: "cache/retrieval/cache.json"
